<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍哄睡打卡系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
        }

        body {
            min-height: 100vh;
            padding: 60px 20px;
            background: linear-gradient(-45deg, #f0c1c1, #f5c1e7, #b8e1fc, #d9b3f5);
            background-size: 500% 500%;
            animation: bgShift 18s ease infinite;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .title {
            text-align: center;
            font-size: 46px;
            color: #fff;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 6px 16px rgba(0,0,0,0.15);
            margin-bottom: 12px;
        }

        .subtitle {
            text-align: center;
            color: #fff;
            font-size: 22px;
            margin-bottom: 70px;
            opacity: 0.95;
            font-weight: 500;
        }

        .card-box {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 32px;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: 0.5s;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.6);
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .card:hover {
            transform: translateY(-18px) scale(1.03);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }

        .name {
            font-size: 28px;
            color: #555;
            margin-bottom: 32px;
            font-weight: 800;
            letter-spacing: 1.5px;
        }

        .btn {
            width: 100%;
            height: 58px;
            border-radius: 20px;
            border: none;
            font-size: 19px;
            font-weight: 800;
            cursor: pointer;
            margin: 12px 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            color: #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .btn-sleep {
            background: linear-gradient(90deg, #b17cff, #e096e8);
        }

        .btn-getup {
            background: linear-gradient(90deg, #74b6ff, #86f4ff);
        }

        .btn:hover {
            transform: scale(1.07);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .tips {
            text-align: center;
            margin-top: 60px;
            color: #fff;
            font-size: 17px;
            text-shadow: 0 3px 10px rgba(0,0,0,0.1);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">1638哄睡提醒</div>
        <div class="subtitle">💖 点击一下 · 全宿舍都收到提醒</div>

        <div class="card-box">
            <div class="card">
                <div class="name">我要上人大</div>
                <button class="btn btn-sleep" onclick="send(1,1)">😴 准备睡觉啦</button>
                <button class="btn btn-getup" onclick="send(1,0)">☀️ 我起床啦</button>
            </div>

            <div class="card">
                <div class="name">NCT啾咪</div>
                <button class="btn btn-sleep" onclick="send(2,1)">😴 准备睡觉啦</button>
                <button class="btn btn-getup" onclick="send(2,0)">☀️ 我起床啦</button>
            </div>

            <div class="card">
                <div class="name">单依纯梦女</div>
                <button class="btn btn-sleep" onclick="send(3,1)">😴 准备睡觉啦</button>
                <button class="btn btn-getup" onclick="send(3,0)">☀️ 我起床啦</button>
            </div>

            <div class="card">
                <div class="name">黎深老婆</div>
                <button class="btn btn-sleep" onclick="send(4,1)">😴 准备睡觉啦</button>
                <button class="btn btn-getup" onclick="send(4,0)">☀️ 我起床啦</button>
            </div>

            <div class="card">
                <div class="name">软萌女王酱</div>
                <button class="btn btn-sleep" onclick="send(5,1)">😴 准备睡觉啦</button>
                <button class="btn btn-getup" onclick="send(5,0)">☀️ 我起床啦</button>
            </div>

            <div class="card">
                <div class="name">茜茜小大王</div>
                <button class="btn btn-sleep" onclick="send(6,1)">😴 准备睡觉啦</button>
                <button class="btn btn-getup" onclick="send(6,0)">☀️ 我起床啦</button>
            </div>
        </div>

        <div class="tips">✅ 点击成功 · 微信 收到提醒</div>
    </div>

    <script>
        function send(id, status) {
            fetch('http://127.0.0.1:5000/set_status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, status: status })
            })
            .then(res => res.json())
            .then(data => {
                if(data.code === 0){
                    alert("✅ 发送成功！全宿舍都收到啦～💤");
                }
            })
        }
    </script>
</body>
</html>
